<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大师兄的 Demo-show</title>
  <style>
    :root {
      --bg: #0b1120;
      --bg-elevated: rgba(17, 24, 39, 0.92);
      --surface: rgba(30, 41, 59, 0.55);
      --border: rgba(148, 163, 184, 0.12);
      --text: #f8fafc;
      --text-muted: rgba(248, 250, 252, 0.55);
      --accent: #00c853;
      --accent-soft: rgba(0, 200, 83, 0.18);
      --accent-border: rgba(0, 200, 83, 0.35);
      --header-h: 64px;
      --radius: 12px;
      --maxw: 1200px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* —— 顶栏 —— */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      height: var(--header-h);
      background: var(--bg-elevated);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .topbar__inner {
      max-width: var(--maxw);
      margin: 0 auto;
      height: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 28px;
    }

    .logo {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(145deg, var(--accent), #00a344);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.1rem;
      color: #fff;
      flex-shrink: 0;
    }

    .topbar__title {
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    /* —— 主视觉 —— */
    main {
      padding-top: calc(var(--header-h) + 36px);
      padding-bottom: 56px;
    }

    .hero {
      text-align: center;
      padding: 0 24px 28px;
      max-width: var(--maxw);
      margin: 0 auto;
    }

    .hero h1 {
      font-size: clamp(1.75rem, 4vw, 2.35rem);
      font-weight: 700;
      margin-bottom: 12px;
      background: linear-gradient(180deg, #fff 0%, rgba(248, 250, 252, 0.88) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero .sub {
      font-size: 0.95rem;
      color: var(--text-muted);
    }

    .hero .sub strong {
      color: rgba(248, 250, 252, 0.82);
      font-weight: 600;
    }

    /* —— 筛选胶囊（顺序：智能识别 → 费用 → 轮胎 → 车务 → 报表） —— */
    .filter-row {
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 0 28px 28px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    .filter-row button {
      padding: 9px 20px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: rgba(248, 250, 252, 0.82);
      font-size: 0.88rem;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }

    .filter-row button:hover {
      background: rgba(51, 65, 85, 0.5);
      color: #fff;
    }

    .filter-row button.is-on {
      background: var(--accent-soft);
      border-color: var(--accent-border);
      color: var(--accent);
      font-weight: 600;
    }

    /* —— 分类块 —— */
    .content {
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 0 28px;
    }

    .section {
      margin-bottom: 44px;
    }

    .section__head {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding-bottom: 16px;
      margin-bottom: 18px;
      border-bottom: 1px solid var(--border);
    }

    .section__icon {
      width: 44px;
      height: 44px;
      border-radius: var(--radius);
      background: rgba(0, 200, 83, 0.12);
      border: 1px solid var(--accent-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      flex-shrink: 0;
    }

    .section__meta { flex: 1; min-width: 0; }

    .section__title {
      font-size: 1.12rem;
      font-weight: 600;
    }

    .section__desc {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .section__count {
      flex-shrink: 0;
      font-size: 0.78rem;
      color: var(--text-muted);
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--border);
      align-self: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    /* —— 演示卡片（参考稿：已上线 + 标题 + 面包屑 + 日期 + 箭头） —— */
    .card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 18px 16px;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .card::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(0, 200, 83, 0.45), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: var(--accent-border);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
    }

    .card:hover::after { opacity: 1; }

    .card.is-disabled {
      cursor: default;
      pointer-events: none;
      opacity: 0.65;
    }

    .card__tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      color: var(--accent);
      background: rgba(0, 200, 83, 0.12);
      border: 1px solid var(--accent-border);
      padding: 4px 10px;
      border-radius: 999px;
      margin-bottom: 12px;
    }

    .card__tag::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }

    .card__title {
      font-size: 0.98rem;
      font-weight: 600;
      margin-bottom: 8px;
      line-height: 1.45;
    }

    .card__crumb {
      font-size: 0.74rem;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    .card__foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .card__date {
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    .card__arrow {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: var(--accent-soft);
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      transition: background 0.2s, color 0.2s;
    }

    .card:hover .card__arrow {
      background: var(--accent);
      color: #fff;
    }

    .empty-hint {
      grid-column: 1 / -1;
      text-align: center;
      padding: 28px 20px;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-muted);
      font-size: 0.88rem;
      background: rgba(15, 23, 42, 0.35);
    }

    .page-empty {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
    }

    @media (max-width: 640px) {
      .topbar__inner,
      .filter-row,
      .content { padding-left: 16px; padding-right: 16px; }
      .section__head { flex-wrap: wrap; }
      .section__count { width: 100%; text-align: center; margin-top: 8px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar__inner">
      <span class="logo" aria-hidden="true">C</span>
      <span class="topbar__title">大师兄的 Demo-show</span>
    </div>
  </header>

  <main>
    <div class="hero">
      <h1>Demo-show 演示</h1>
      <p class="sub">点击卡片即可体验，联系人<strong>凌浩然</strong></p>
    </div>

    <div class="filter-row" id="filters" role="tablist" aria-label="模块筛选"></div>
    <div class="content" id="root"></div>
  </main>

  <script>
    (function () {
      'use strict';

      /**
       * path 均为相对本文件（Demo-show/index.html）。静态资源已拷入本目录，可直接整包 push 到 GitHub Pages。
       * 筛选顺序：智能识别 → 费用管理 → 车务中心 → 报表中心（轮胎为车务中心下二级目录）
       */
      var MODULE_ITEMS = {
        '智能识别': [
          { title: '智能建单v1.0', path: '智能识别系统/智能建单v1.0/PT/index.html', date: '2026-05-22' }
        ],
        '费用管理': [],
        '车务中心': [
          { title: '轮胎管理', path: '车务中心/轮胎管理/Cursor-html/index.html', date: '2026-04-17' }
        ],
        '报表中心': []
      };

      var SECTION_DEF = [
        { id: '智能识别', icon: '🤖', desc: 'AI 智能识别、录单辅助、数据映射' },
        { id: '费用管理', icon: '💰', desc: '在途费用、成本核算、费用分析' },
        { id: '车务中心', icon: '🔧', desc: '车务业务（含二级目录，如轮胎管理等）' },
        { id: '报表中心', icon: '📊', desc: '车辆运营报表、油耗分析、数据导出' }
      ];

      var active = 'all';
      var elFilters = document.getElementById('filters');
      var elRoot = document.getElementById('root');

      function filterButtons() {
        var keys = [{ id: 'all', label: '全部功能' }].concat(SECTION_DEF.map(function (s) {
          return { id: s.id, label: s.id };
        }));
        elFilters.innerHTML = keys.map(function (k) {
          var on = k.id === active ? ' is-on' : '';
          return '<button type="button" class="js-f' + on + '" data-id="' + k.id + '" role="tab">' + k.label + '</button>';
        }).join('');
      }

      function cardHtml(sectionId, item) {
        var path = item.path || '';
        var title = item.title || '未命名演示';
        var date = item.date || '—';
        var tag = item.tag || '已上线';
        var crumb = sectionId + ' / ' + title;
        if (!path) {
          return (
            '<div class="card is-disabled">' +
              '<span class="card__tag">' + tag + '</span>' +
              '<div class="card__title">' + title + '</div>' +
              '<div class="card__crumb">' + crumb + '</div>' +
              '<div class="card__foot">' +
                '<span class="card__date">' + date + '</span>' +
                '<span class="card__arrow">→</span>' +
              '</div>' +
            '</div>'
          );
        }
        return (
          '<a class="card" href="' + path + '" target="_blank" rel="noopener noreferrer">' +
            '<span class="card__tag">' + tag + '</span>' +
            '<div class="card__title">' + title + '</div>' +
            '<div class="card__crumb">' + crumb + '</div>' +
            '<div class="card__foot">' +
              '<span class="card__date">' + date + '</span>' +
              '<span class="card__arrow">→</span>' +
            '</div>' +
          '</a>'
        );
      }

      function render() {
        var html = '';
        var anySection = false;

        SECTION_DEF.forEach(function (sec) {
          if (active !== 'all' && sec.id !== active) return;

          var items = MODULE_ITEMS[sec.id] || [];
          anySection = true;

          html += '<section class="section" data-section="' + sec.id + '">';
          html += '<div class="section__head">';
          html += '<div class="section__icon">' + sec.icon + '</div>';
          html += '<div class="section__meta">';
          html += '<div class="section__title">' + sec.id + '</div>';
          html += '<div class="section__desc">' + sec.desc + '</div>';
          html += '</div>';
          html += '<div class="section__count">' + (items.length ? items.length + ' 个功能' : '0 个功能') + '</div>';
          html += '</div>';
          html += '<div class="grid">';

          if (!items.length) {
            html += '<div class="empty-hint">本模块演示清单为空。请在 <code style="color:#94a3b8">MODULE_ITEMS</code> 中为「' + sec.id + '」添加条目（title、path、date）。</div>';
          } else {
            items.forEach(function (item) {
              html += cardHtml(sec.id, item);
            });
          }

          html += '</div></section>';
        });

        if (!anySection) {
          elRoot.innerHTML = '<div class="page-empty">没有可展示的模块。</div>';
          return;
        }
        elRoot.innerHTML = html;
      }

      elFilters.addEventListener('click', function (e) {
        var btn = e.target.closest('.js-f');
        if (!btn) return;
        active = btn.getAttribute('data-id') || 'all';
        filterButtons();
        render();
      });

      filterButtons();
      render();
    })();
  </script>
</body>
</html>
